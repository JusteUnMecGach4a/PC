<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sécurité Poste de Travail | PC-1</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="background-wrapper">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="main-card">
        <header>
            <div class="icon-box">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
                </svg>
            </div>
            <h1>Sécurisez votre espace</h1>
            <p>Partez l'esprit tranquille. Un simple raccourci suffit pour protéger votre session et vos données.</p>
        </header>

        <section class="shortcuts-grid">
            <div class="shortcut-item">
                <div class="os-info">
                    <span class="os-label">Windows</span>
                    <span class="os-desc">Verrouillage rapide</span>
                </div>
                <div class="keys">
                    <kbd>Win</kbd>
                    <span class="plus">+</span>
                    <kbd>L</kbd>
                </div>
            </div>

            <div class="shortcut-item">
                <div class="os-info">
                    <span class="os-label">Linux / Ubuntu</span>
                    <span class="os-desc">Session sécurisée</span>
                </div>
                <div class="keys">
                    <kbd>Ctrl</kbd>
                    <span class="plus">+</span>
                    <kbd>Alt</kbd>
                    <span class="plus">+</span>
                    <kbd>L</kbd>
                </div>
            </div>
        </section>

        <footer>
            <p>Un réflexe essentiel pour la sécurité de tous.</p>
        </footer>
    </main>

</body>
</html>
